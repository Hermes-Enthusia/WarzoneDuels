name: WarzoneDuels
main: dev.minecraft.warzoneduels.WarzoneDuelsPlugin
version: 1.0.0
api-version: "1.21"
softdepend: [Vault, EnthusiaTeleport, CombatLogX, Plan]
commands:
  duel:
    description: Death Duel commands and setup tools.
    usage: /duel <player|accept|deny|review|watch|draw|surrender|cancel|vault|info|settings|reload|restoreloadout|stats|setspectatorlocation>
  surrender:
    description: Request a duel draw / surrender.
    usage: /surrender
    aliases: [draw]
  vault:
    description: Open your unclaimed duel vault.
    usage: /vault
    aliases: [spoils, claimspoils, duelvault]
  stats:
    description: View Death Duel stats.
    usage: /stats [player]
permissions:
  warzoneduels.admin:
    description: Admin commands for WarzoneDuels.
    default: op
  warzoneduels.bypass.build:
    description: Allows staff to place, break, bucket, and interact with protected arena blocks for repairs.
    default: op
  warzoneduels.bypass.enter:
    description: Allows staff to enter the fighting footprint and bypass spectator containment.
    default: op
  warzoneduels.duel.send:
    description: Allows sending duel requests to other players.
    default: true
  warzoneduels.duel.accept:
    description: Allows accepting incoming duel requests.
    default: true
  warzoneduels.duel.deny:
    description: Allows denying incoming duel requests.
    default: true
  warzoneduels.duel.draw:
    description: Allows requesting a draw or surrendering during an active duel.
    default: true
  warzoneduels.duel.spectate:
    description: Allows spectating active duels via /duel watch.
    default: true
  warzoneduels.duel.vault:
    description: Allows claiming spoils from the duel vault.
    default: true
  warzoneduels.stats:
    description: Allows viewing duel stats for yourself and others.
    default: true
