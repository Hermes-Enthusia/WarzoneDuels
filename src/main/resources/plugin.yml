name: WarzoneDuels
main: dev.minecraft.warzoneduels.WarzoneDuelsPlugin
version: 1.0.0
api-version: "1.21"
softdepend: [Vault, EnthusiaTeleport, CombatLogX, Plan]
commands:
  duel:
    description: Death Duel commands and setup tools.
    usage: /duel <player|accept|deny|review|watch|draw|surrender|cancel|vault|info|settings|reload|restoreloadout|stats>
  surrender:
    description: Request a duel draw / surrender.
    usage: /surrender
    aliases: [draw]
  vault:
    description: Open your unclaimed duel vault.
    usage: /vault
    aliases: [spoils, claimspoils, duelvault]
  stats:
    description: View Death Duel stats.
    usage: /stats [player]
permissions:
  warzoneduels.admin:
    description: Admin commands for WarzoneDuels.
    default: op
  warzoneduels.bypass.build:
    description: Allows staff to place, break, bucket, and interact with protected arena blocks for repairs.
    default: op
  warzoneduels.bypass.enter:
    description: Allows staff to enter the fighting footprint and bypass spectator containment.
    default: op
